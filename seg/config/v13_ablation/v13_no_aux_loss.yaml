seed: 42
device: cuda
num_workers: 0
save_dir: seg/runs/v13_ablation/v13_no_aux_loss
data:
  root: datasets/pothole_binary/processed
  class_names:
  - background
  - pothole
  ignore_index: 255
  mask_positive_threshold: 0
  mask_ignore_values: []
  allow_fuzzy_filename_match: true
  fuzzy_match_threshold: 0.82
model:
  name: lite_race
  num_classes: 2
  use_aux: false
  base_channels: 24
  context_channels: 96
  use_detail_branch: true
  context_module: lite_aspp
  liteaspp_rates:
  - 1
  - 2
  - 4
  use_boundary_gate: true
  fuse_boundary_logit: true
train:
  image_size:
  - 256
  - 384
  batch_size: 4
  epochs: 60
  amp: true
  base_lr: 0.00032
  weight_decay: 0.0002
  grad_clip: 1.0
  print_freq: 1
  early_stopping_patience: 12
  boundary_width: 3
  class_weights:
  - 0.56
  - 0.44
  augmentation:
    horizontal_flip_p: 0.5
    brightness_delta: 0.05
    contrast_range: 0.08
    gaussian_noise_std: 0.01
  loss:
    ce_weight: 1.0
    dice_weight: 0.35
    aux_weight: 0.0
    boundary_weight: 0.1
val:
  batch_size: 2
  threshold: 0.6
optimizer:
  name: adamw
scheduler:
  name: poly
  power: 0.9
  min_lr: 1.0e-06
infer:
  overlay_alpha: 0.45
  threshold: 0.6
  min_area_pixels: 120
  palette:
  - - 30
    - 30
    - 30
  - - 255
    - 90
    - 0
v13_ablation:
  name: v13_no_aux_loss
  description: Disable auxiliary segmentation head/loss.
  base_config: seg/config/pothole_binary_literace_train.yaml
